version: 2
# Grant Dependabot read access to private GitHub repos in the org.
# Required because workflows under .github/workflows/ consume reusable
# workflows from the private nex-crm/.github repo (see `uses:
# nex-crm/.github/...` refs). Without this, every weekly Dependabot
# run fails closed with `git_dependencies_not_reachable`.
#
# `DEPENDABOT_PRIVATE_REPO_TOKEN` is provisioned at the org level —
# see nex-crm/docs#37 for the original rollout + the gh command to
# create it.
registries:
  nex-crm-github:
    type: git
    url: https://github.com
    username: x-access-token
    password: ${{secrets.DEPENDABOT_PRIVATE_REPO_TOKEN}}

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    registries:
      - nex-crm-github
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/openclaw-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/claude-code-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"
