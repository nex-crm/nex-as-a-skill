version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/openclaw-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      # typescript and its companion @types/* packages must move together —
      # bumping `typescript` to a new major (e.g. 5→6) without bumping
      # `@types/node` produced two PRs that step on each other's lockfile
      # and tsconfig (TS 6 stops auto-loading @types/*; the tsconfig fix
      # belongs in the same PR as the typescript bump). Group them so
      # Dependabot ships one PR with both, including major bumps.
      typescript-types:
        patterns: ["typescript", "@types/*"]
        update-types: ["major", "minor", "patch"]
      all-dependencies:
        patterns: ["*"]
        exclude-patterns: ["typescript", "@types/*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/claude-code-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers: ["nex-crm/engineering"]
    # labels: ["dependencies"]
    groups:
      # See note in /openclaw-plugin entry — typescript + @types/* must
      # move together (same lockfile, same tsconfig fix).
      typescript-types:
        patterns: ["typescript", "@types/*"]
        update-types: ["major", "minor", "patch"]
      all-dependencies:
        patterns: ["*"]
        exclude-patterns: ["typescript", "@types/*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore"
      include: "scope"
