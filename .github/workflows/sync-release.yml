name: Sync nex-cli Release

on:
  repository_dispatch:
    types: [nex-cli-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.3). Defaults to latest nex-cli release."
        required: false

concurrency:
  group: sync-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  mirror-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.CLI_REPO_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION=$(gh release view --repo nex-crm/nex-cli --json tagName -q .tagName)
          fi
          # Normalize: ensure v prefix
          VERSION="${VERSION#v}"
          VERSION="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Sync Release" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists, skipping." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binaries from nex-cli
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CLI_REPO_TOKEN }}
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.version }}"
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            echo "Downloading nex-cli-${target}..."
            gh release download "$VERSION" \
              --repo nex-crm/nex-cli \
              --pattern "nex-cli-${target}" \
              --dir dist
          done
          ls -lh dist/

      - name: Verify binary
        if: steps.check.outputs.exists == 'false'
        run: |
          BINARY="dist/nex-cli-linux-x64"
          chmod +x "$BINARY"
          VERSION_OUT=$("$BINARY" --version)
          echo "Binary reports version: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "FAIL: version output is not semver"; exit 1; }

      - name: Generate checksums
        if: steps.check.outputs.exists == 'false'
        run: |
          cd dist
          sha256sum nex-cli-* > checksums.txt
          cat checksums.txt

      - name: Create release
        id: create
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "nex-cli ${VERSION} binaries.

          Install:
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/nex-crm/nex-as-a-skill/main/install.sh | sh
          \`\`\`

          Or via Homebrew:
          \`\`\`
          brew install nex-crm/tap/nex
          \`\`\`" \
            dist/nex-cli-* dist/checksums.txt
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "**Release created**" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Homebrew formula
        if: steps.create.outputs.created == 'true'
        continue-on-error: true
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # ratchet:dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: nex-crm/tap
          formula: nex
          tag: ${{ steps.version.outputs.version }}

  verify-release:
    needs: mirror-release
    if: needs.mirror-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download from public URL (no auth)
        env:
          VERSION: ${{ needs.mirror-release.outputs.version }}
        run: |
          BASE_URL="https://github.com/nex-crm/nex-as-a-skill/releases/download/${VERSION}"
          mkdir -p dist

          echo "==> Downloading checksums"
          curl -fsSL "${BASE_URL}/checksums.txt" -o dist/checksums.txt
          cat dist/checksums.txt

          echo "==> Downloading linux-x64 binary"
          curl -fsSL "${BASE_URL}/nex-cli-linux-x64" -o dist/nex-cli
          chmod +x dist/nex-cli

      - name: Verify checksum
        run: |
          EXPECTED=$(grep "nex-cli-linux-x64" dist/checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum dist/nex-cli | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FAIL: checksum mismatch — expected $EXPECTED, got $ACTUAL"
            exit 1
          fi
          echo "PASS: checksum matches ($ACTUAL)"

      - name: Verify binary runs
        run: |
          VERSION_OUT=$(dist/nex-cli --version)
          echo "PASS: binary reports version $VERSION_OUT"
          echo "$VERSION_OUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "FAIL: version output is not semver"; exit 1; }

      - name: Verify install.sh (default path)
        run: |
          sh install.sh
          # install.sh picks /usr/local/bin when any of: writable, running as root,
          # or sudo is available. Falls back to $HOME/.local/bin only when all three
          # fail — exercised by the next step.
          export PATH="${HOME}/.local/bin:/usr/local/bin:${PATH}"
          nex-cli --version
          echo "PASS: install.sh default path"

      - name: Verify install.sh (fallback path)
        run: |
          # Exercise the $HOME/.local/bin branch by running install.sh in an env
          # with no sudo and no write access to /usr/local/bin. Uses a container
          # rather than runner-level perms so it doesn't poison later steps.
          docker run --rm -v "$PWD/install.sh:/tmp/install.sh:ro" ubuntu:22.04 bash -c '
            set -eu
            apt-get update -qq
            apt-get install -y -qq curl ca-certificates >/dev/null
            # Strip sudo so `command -v sudo` fails in install.sh.
            apt-get remove -y -qq sudo >/dev/null 2>&1 || true
            useradd -m tester
            # tester has no write on /usr/local/bin and no sudo → fallback branch.
            su tester -s /bin/sh -c "sh /tmp/install.sh"
            test -x /home/tester/.local/bin/nex-cli
            su tester -s /bin/sh -c "/home/tester/.local/bin/nex-cli --version"
          '
          echo "PASS: install.sh fallback path"

  publish-npm:
    needs: mirror-release
    if: needs.mirror-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate shims
        run: node --check bin/nex.js && node --check bin/nex-mcp.js

      - name: Bump version and publish
        id: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PUBLISHED=$(npm view @nex-ai/nex version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -e "console.log(require('./package.json').version)")

          NEEDS_BUMP=$(node -e "
            const [lM,lm,lp] = '$LOCAL'.split('.').map(Number);
            const [pM,pm,pp] = '$PUBLISHED'.split('.').map(Number);
            const localNum = lM*1000000 + lm*1000 + lp;
            const pubNum = pM*1000000 + pm*1000 + pp;
            console.log(localNum <= pubNum ? 'true' : 'false');
          ")

          if [ "$NEEDS_BUMP" = "true" ]; then
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
          fi

          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "@nex-ai/nex@$NEW_VERSION" version 2>/dev/null; then
            echo "Version $NEW_VERSION already on npm, skipping."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            npm publish --access public
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      # If a `push` trigger is ever added to this workflow, adopt the
      # two-phase pattern from publish-cli.yml (check-version →
      # bump-pr OR publish, mutually exclusive). This step opens a PR
      # that only touches package.json, so a naive push trigger would
      # re-enter this workflow and open a second bump PR indefinitely.
      - name: Open version bump PR
        if: steps.npm.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.npm.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/bump-v${NEW_VERSION}"
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "chore: bump to v${NEW_VERSION}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/nex-crm/nex-as-a-skill.git"
          git push origin "$BRANCH" --force
          existing=$(gh pr list --head "$BRANCH" --json number -q '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$existing" ]; then
            gh pr create \
              --title "chore: bump to v${NEW_VERSION}" \
              --body "Sync package.json with npm-published v${NEW_VERSION}." \
              --head "$BRANCH"
          else
            echo "Bump PR #${existing} already exists"
          fi
