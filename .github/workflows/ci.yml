name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate shim scripts
        run: node --check bin/nex.js && node --check bin/nex-mcp.js

  openclaw-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test

  claude-code-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-plugin
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
