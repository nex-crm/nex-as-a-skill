name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Sync plugin into CLI
        run: |
          rsync -a ../claude-code-plugin/src/ src/plugin/
          rsync -a ../claude-code-plugin/commands/ plugin-commands/
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run tests
        run: bun run test:all

  openclaw-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test

  claude-code-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
