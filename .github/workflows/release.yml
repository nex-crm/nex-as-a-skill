name: Release Binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Build all targets
        run: |
          mkdir -p dist
          bun build --compile --minify --target=bun-darwin-arm64 src/nex.ts --outfile dist/nex-darwin-arm64
          bun build --compile --minify --target=bun-darwin-x64 src/nex.ts --outfile dist/nex-darwin-x64
          bun build --compile --minify --target=bun-linux-arm64 src/nex.ts --outfile dist/nex-linux-arm64
          bun build --compile --minify --target=bun-linux-x64 src/nex.ts --outfile dist/nex-linux-x64

      - name: Generate checksums
        run: cd dist && sha256sum nex-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nex-darwin-arm64
            dist/nex-darwin-x64
            dist/nex-linux-arm64
            dist/nex-linux-x64
            dist/checksums.txt
