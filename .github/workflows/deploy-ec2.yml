# .github/workflows/deploy-ec2.yml
# Auto-deploys MCP HTTP server to EC2 on push to main
name: Deploy MCP HTTP Server to EC2

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-ec2.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/nex-mcp

            # Pull latest code
            git pull origin main

            # Install and build the CLI (MCP server lives here)
            cd cli
            npm ci --production
            npm run build
            cd ..

            # Ensure systemd service uses HTTP transport
            sudo tee /etc/systemd/system/nex-mcp.service > /dev/null <<'EOF'
            [Unit]
            Description=Nex MCP HTTP Server
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/nex-mcp/cli
            Environment=MCP_TRANSPORT=http
            Environment=MCP_PORT=3001
            Environment=NODE_ENV=production
            ExecStart=/usr/bin/node dist/mcp/index.js
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable nex-mcp
            sudo systemctl restart nex-mcp

            # Health check
            sleep 3
            curl -sf http://localhost:3001/health || exit 1
            echo "Deploy successful — MCP HTTP server running on port 3001"
