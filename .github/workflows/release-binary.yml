name: Release Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0). Defaults to latest nex-cli release."
        required: false
  repository_dispatch:
    types: [nex-cli-release]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.CLI_REPO_TOKEN }}
        run: |
          # Priority: workflow_dispatch input > repository_dispatch payload > latest
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION=$(gh release view --repo nex-crm/nex-cli --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binaries from nex-cli
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CLI_REPO_TOKEN }}
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.version }}"
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            echo "Downloading nex-cli-${target}..."
            gh release download "$VERSION" \
              --repo nex-crm/nex-cli \
              --pattern "nex-cli-${target}" \
              --dir dist
          done
          ls -lh dist/

      - name: Integration tests
        if: steps.check.outputs.exists == 'false'
        env:
          NEX_API_KEY: ""
        run: |
          BINARY="dist/nex-cli-linux-x64"
          chmod +x "$BINARY"

          echo "==> Version output"
          VERSION_OUT=$("$BINARY" --version)
          echo "$VERSION_OUT"
          echo "$VERSION_OUT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "FAIL: version not semver"; exit 1; }

          echo "==> Help lists commands"
          HELP_OUT=$("$BINARY" --cmd help)
          echo "$HELP_OUT"
          for cmd in objects records search help quit ask remember recall; do
            echo "$HELP_OUT" | grep -qw "$cmd" || { echo "FAIL: help missing '$cmd'"; exit 1; }
          done

          echo "==> JSON output"
          JSON_OUT=$("$BINARY" --cmd help --json)
          echo "$JSON_OUT"
          echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']==True; assert 'search' in d['data']" \
            || { echo "FAIL: JSON output invalid"; exit 1; }

          echo "==> Telemetry command"
          "$BINARY" --cmd telemetry | grep -qi "telemetry" || { echo "FAIL: telemetry output"; exit 1; }

          echo "==> Invalid command exits non-zero"
          if "$BINARY" --cmd "notacommand" 2>/dev/null; then
            echo "FAIL: invalid command should exit non-zero"; exit 1
          fi

          echo "==> MCP server starts"
          timeout 3 "$BINARY" mcp 2>mcp_stderr.log || true
          cat mcp_stderr.log
          grep -qi "mcp" mcp_stderr.log || { echo "FAIL: MCP server did not start"; exit 1; }

          echo "==> All integration tests passed"

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "nex-cli $VERSION binaries.

          Install:
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/nex-crm/nex-as-a-skill/main/install.sh | sh
          \`\`\`" \
            dist/nex-cli-*

      - name: Skip if already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.version }} already exists, skipping."
